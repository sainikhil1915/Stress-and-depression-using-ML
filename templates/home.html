<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home - Detect Stress/Depression</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: url('/static/bg.jpg') no-repeat center center fixed;
      background-size: cover;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Stress/Depression Detector</a>
      <div class="d-flex">
        <a class="btn btn-outline-light me-2" href="/mainhome">Main Home</a>
        <a class="btn btn-outline-light me-2" href="/home">Detect of Stress</a>
        <a class="btn btn-outline-light me-2" href="/about">About</a>
        <a class="btn btn-outline-light" href="/logout">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="card p-4 shadow rounded bg-light">
      <h2 class="mb-4 text-center">Welcome, {{ username }}</h2>

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Select Input Type</label><br>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="input_type" id="tweets" value="tweets" checked onclick="toggleInputType()">
            <label class="form-check-label" for="tweets">Tweets</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="input_type" id="depression" value="depression" onclick="toggleInputType()">
            <label class="form-check-label" for="depression">Depression Questions</label>
          </div>
        </div>

        <div class="mb-3">
          <label for="model" class="form-label">Select Model</label>
          <select class="form-select" name="model" id="model" required>
            <option value="mlp">MLP</option>
            <option value="svm">SVM</option>
            <option value="nb">Naive Bayes</option>
            <option value="dt">Decision Tree</option>
            <option value="lr">Logistic Regression</option>
            <option value="gb">Gradient Boosting</option>
            <option value="rf">Random Forest</option>
          </select>
        </div>

        <div id="tweets-input" class="mb-3">
          <label for="message" class="form-label">Enter Tweet</label>
          <textarea class="form-control" name="message" id="message" rows="4" placeholder="Type your tweet here..."></textarea>
        </div>

        <div id="depression-inputs" style="display: none;">
          {% for i in range(1, 11) %}
          <div class="mb-3">
            <label class="form-label">Q{{ i }}: {{ [
              'Little interest or pleasure in doing things',
              'Feeling down, depressed, or hopeless',
              'Trouble falling or staying asleep, or sleeping too much',
              'Feeling tired or having little energy',
              'Poor appetite or overeating',
              'Feeling bad about yourself—or that you are a failure or have let yourself or your family down',
              'Trouble concentrating on things, such as reading the newspaper or watching television',
              'Moving or speaking so slowly that other people could have noticed? Or the opposite—being so fidgety or restless',
              'Thoughts that you would be better off dead or of hurting yourself in some way',
              'If you checked any problems, how difficult have these made it to do your work, home tasks, or get along with people?'
            ][i-1] }}</label>
            <select class="form-select" name="q{{ i }}">
              <option value="0">0 - Not at all</option>
              <option value="1">1 - Several days</option>
              <option value="2">2 - More than half the days</option>
              <option value="3">3 - Nearly every day</option>
            </select>
          </div>
          {% endfor %}
        </div>

        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary">Detect</button>
        </div>
      </form>

      {% if result %}
      <div class="alert alert-info mt-4" role="alert">
        <strong>Prediction:</strong> {{ result }}
      </div>
      {% endif %}
    </div>
  </div>

  <script>
    function toggleInputType() {
      const tweets = document.getElementById('tweets').checked;
      document.getElementById('tweets-input').style.display = tweets ? 'block' : 'none';
      document.getElementById('depression-inputs').style.display = tweets ? 'none' : 'block';
    }
    window.onload = toggleInputType;
  </script>
</body>
</html>
